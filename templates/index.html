<!DOCTYPE html>
<html>
<head>
  <title>Digit Recognizer</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
    canvas { border: 2px solid #333; cursor: crosshair; display: block; margin: 20px 0; }
    button { padding: 10px 24px; font-size: 16px; margin-right: 10px; cursor: pointer; }
    .result { padding: 12px; margin: 8px 0; background: #f5f5f5; border-radius: 8px; }
    .result span { font-weight: bold; font-size: 20px; }
  </style>
</head>
<body>
  <h1>Draw a digit (0-9)</h1>
  <canvas id="canvas" width="280" height="280"></canvas>
  <button onclick="predict()">Predict</button>
  <button onclick="clearCanvas()">Clear</button>
  <div id="results"></div>
  <script src="/static/app.js"></script>
</body>
</html>
